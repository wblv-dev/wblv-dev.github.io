backend:
  name: github
  repo: wblv-dev/wblv-dev.github.io
  branch: main
  base_url: https://decap-oauth.wellbelove.workers.dev
  auth_endpoint: /auth

publish_mode: editorial_workflow
media_folder: "src/assets/images/uploads"
public_folder: "/assets/images/uploads"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "src/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Tags", name: "tags", widget: "list", default: ["post"] }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "docs"
    label: "Documentation"
    folder: "src/docs"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "URL Path", name: "permalink", widget: "string" }
      - { label: "Tags", name: "tags", widget: "list", default: ["doc"] }
      - { label: "GitHub URL", name: "github_url", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
